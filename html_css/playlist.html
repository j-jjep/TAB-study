<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Playlist</title>
    <link rel="stylesheet" href="playlist.css"> 
    <script src="https://kit.fontawesome.com/ac470de742.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">

        <div class="header">
            <span class="close">✖</span>
            <h3 class="playlist">Playlist</h3>
        </div>

        <div class="main_music">
            <div class="album_cover">
                <i class="fa-solid fa-image"></i>
            </div>
            <div class="album_text">
                <strong class="album_name">Random Love</strong>
                <p class="album_artist">by Divay Kapoor</p>
            </div>
        </div>

        <div class="button">
            <div class="play">▶ PLAY</div>
            <div class="heart">♥</div>
            <strong class="plus">＋</strong>
        </div>

        <div class="song_list">
            <div class="song">
                <div class="cover_red"></div>
                <div>
                    <div class="song_name">Matargasti</div>
                    <div class="artist_name">Mohit Chuahan</div>
                </div>
            </div>

            <div class="song">
                <div class="cover_pink"></div>
                <div>
                    <div class="song_name">Attitude</div>
                    <div class="artist_name">Lewis OfMan Attitude</div>
                </div>
            </div>

            <div class="song">
                <div class="cover_blue"></div>
                <div class="song_text">
                    <div class="song_name">Try Everything</div>
                    <div class="artist_name">Shakira Zootopia</div>
                </div>
            </div>

            <div class="song">
                <div class="cover_grey"></div>
                <div>
                    <div class="song_name">Sunflower</div>
                    <div class="artist_name">Joseph Vincent Sunflower</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
