<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <link rel="stylesheet" href="google.css"> 
    <script src="https://kit.fontawesome.com/ac470de742.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="top">
        <div class="top_left">
            <span>Google 정보</span>
            <span>스토어</span>
        </div>

        <div class="top_right">
            <span>Gamil</span>
            <span>이미지</span>
            <i class="fa-solid fa-bars"></i>            
            <span class="login">로그인</span>
        </div>
    </div>

    <div class="main">
        <h1 class="google">Google</h1>
        <div class="search_bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <div class="right_icon">
                <i class="fa-regular fa-keyboard"></i>
                <i class="fa-solid fa-microphone"></i>
                <i class="fa-solid fa-camera"></i>
            </div>
        </div>
        <div class="button">
            <span>Google 검색</span>
            <span>I'm Feeling Lucky!</span>
        </div>
    </div>

</body>
</html>
